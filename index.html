<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Viewport Debug</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    color: #0f0;
    font: 14px monospace;
    overflow: hidden;
}
#canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
}
#log {
    position: fixed;
    left: 8px;
    right: 8px;
    top: 8px;
    bottom: 8px;
    padding: 10px;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.2);
    overflow: auto;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>
(function() {
    var logEl = document.getElementById("log");
    var canvas = document.getElementById("canvas");

    function line(s) {
        console.log(s);
        logEl.textContent += s + "\n";
    }

    function dump() {
        var vv = window.visualViewport;
        logEl.textContent = "";

        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        line("window.innerWidth = " + window.innerWidth);
        line("window.innerHeight = " + window.innerHeight);
        line("devicePixelRatio = " + window.devicePixelRatio);
        line("screen.width = " + window.screen.width);
        line("screen.height = " + window.screen.height);
        line("documentElement.clientWidth = " + document.documentElement.clientWidth);
        line("documentElement.clientHeight = " + document.documentElement.clientHeight);
        line("canvas.clientWidth = " + canvas.clientWidth);
        line("canvas.clientHeight = " + canvas.clientHeight);
        line("canvas.width(attr) = " + canvas.width);
        line("canvas.height(attr) = " + canvas.height);

        if (vv) {
            line("visualViewport.width = " + vv.width);
            line("visualViewport.height = " + vv.height);
            line("visualViewport.scale = " + vv.scale);
        }

        line("desktop site guess = " + (window.innerWidth > 700 ? "LIKELY YES / SCALED PAGE" : "likely mobile"));
    }

    window.addEventListener("load", dump);
    window.addEventListener("resize", dump);
    window.addEventListener("orientationchange", function() {
        setTimeout(dump, 100);
        setTimeout(dump, 400);
        setTimeout(dump, 800);
    });
})();
</script>
</body>
</html>
