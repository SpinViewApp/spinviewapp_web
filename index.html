<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>triangle</title>

<style>
html, body{
    margin:0;
    height:100%;
    background:black;
    overflow:hidden;
}

/* canvas */
canvas#canvas{
    width:100%;
    height:100%;
    display:block;
}

/* title menu */
.game-title{
    pointer-events:none;
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    font-family:"Arial Black", Gadget, sans-serif;
    font-size:30px;
    z-index:1;
}

.game-menu-item{
    pointer-events:auto;
    font-size:18px;
    padding-left:10px;
    font-family:Arial, Helvetica, sans-serif;
}

.game-menu-link{
    color:white;
    text-decoration:none;
}

/* loader overlay */

#loader{
    position:fixed;
    inset:0;
    background:#0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    z-index:10;
    transition:opacity 0.5s ease;
}

#loader.hidden{
    opacity:0;
    pointer-events:none;
}

/* spinner */

.spinner{
    width:48px;
    height:48px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.15);
    border-top:4px solid white;
    animation:spin 1s linear infinite;
    margin-bottom:18px;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

.loader-text{
    font-size:16px;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading engine...</div>
</div>

<div class="game-title">triangle
<span class="game-menu-item"><a class="game-menu-link" href="index.html">home</a></span>
<span class="game-menu-item"><a class="game-menu-link" href="https://github.com/floooh/sokol-samples/tree/master/sapp/triangle-sapp.c" target="_blank">src</a></span>
<span class="game-menu-item"><a class="game-menu-link" href="https://github.com/floooh/sokol-samples/tree/master/sapp/triangle-sapp.glsl" target="_blank">glsl</a></span>
</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<script>

var Module = {

    canvas: (() => document.getElementById('canvas'))(),

    preRun: [],

    print: (...args) => console.log('[stdout]: ' + args.join(' ')),

    printErr: (...args) => console.log('[stderr]: ' + args.join(' ')),

    onRuntimeInitialized: function(){
        const loader = document.getElementById("loader");
        loader.classList.add("hidden");
        setTimeout(()=>loader.remove(),500);
    }
};

window.onerror = (event) =>
    console.log('[onerror]: ' + event.message);

</script>

<script async src="App.js"></script>

</body>
</html>
