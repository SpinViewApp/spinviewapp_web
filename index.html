<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <script defer src="version.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        body {
            position: fixed;
            inset: 0;
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            background: black;
        }

        .game-title {
            pointer-events: none;
            position: absolute;
            left: 10px;
            bottom: 10px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 24px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="gameTitle" class="game-title">Spinview</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        function getCurrentVersionFromUrl() {
            try {
                const url = new URL(window.location.href);
                return url.searchParams.get("_v") || "dev";
            } catch (_) {
                return "dev";
            }
        }

        function updateVersionLabels() {
            const version = getCurrentVersionFromUrl();
            const title = document.getElementById("gameTitle");
            if (title) title.textContent = "Spinview " + version;
            document.title = "Spinview " + version;
        }

        updateVersionLabels();

        var Module = {
            canvas: document.getElementById("canvas"),
            preRun: [],
            locateFile: function(path) {
                const version = getCurrentVersionFromUrl();
                const sep = path.indexOf("?") >= 0 ? "&" : "?";
                return path + sep + "_v=" + encodeURIComponent(version);
            },
            print: function() {
                console.log("[stdout]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            printErr: function() {
                console.log("[stderr]: " + Array.prototype.slice.call(arguments).join(" "));
            }
        };

        window.onerror = function(message, source, lineno, colno, error) {
            console.log("[onerror]:", message, source, lineno, colno, error);
        };

        (function() {
            const version = getCurrentVersionFromUrl();
            const s = document.createElement("script");
            s.async = true;
            s.src = "App.js?_v=" + encodeURIComponent(version);
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
