<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spinview</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<script defer src="version.js"></script>
<script defer src="keys.js"></script>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

body{
    position:fixed;
    inset:0;
    touch-action:none;
    overscroll-behavior:none;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
    font-family:Arial, Helvetica, sans-serif;
}

#canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    background:black;
    z-index:0;
    outline:none;
}

.game-title{
    position:fixed;
    left:12px;
    bottom:12px;
    color:white;
    font-size:24px;
    padding:8px 10px;
    border-radius:8px;
    background:rgba(0,0,0,0.25);
    user-select:none;
    -webkit-user-select:none;
    cursor:pointer;
    z-index:10;
}

#loader{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:#0a0a0a;
    color:white;
    z-index:50;
}

.spinner{
    width:40px;
    height:40px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.15);
    border-top-color:white;
    animation:spin 1s linear infinite;
    margin-bottom:12px;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

#debugConsole{
    position:fixed;
    left:10px;
    right:10px;
    bottom:60px;
    max-height:45vh;
    overflow:auto;
    padding:10px;
    font:12px monospace;
    background:rgba(0,0,0,0.9);
    color:#9fef9f;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.15);
    white-space:pre-wrap;
    word-break:break-word;
    display:none;
    z-index:100;
}

#debugConsole.visible{
    display:block;
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loaderText">Loading engine...</div>
</div>

<div id="gameTitle" class="game-title">Spinview</div>
<div id="debugConsole"></div>

<canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>

<script>
function getCurrentVersion(){
    try{
        var url = new URL(window.location.href);
        var v = url.searchParams.get("_v");
        if(v) return v;

        v = localStorage.getItem("siteVersion");
        if(v) return v;
    }
    catch(e){
    }
    return "dev";
}

function updateVersionLabels(){
    var version = getCurrentVersion();
    var t = document.getElementById("gameTitle");
    var l = document.getElementById("loaderText");

    document.title = "Spinview " + version;

    if(t) t.textContent = "Spinview " + version;
    if(l) l.textContent = "Loading engine... " + version;
}

var debugConsole = document.getElementById("debugConsole");
var consoleVisible = false;

function consoleShow(){
    consoleVisible = true;
    debugConsole.classList.add("visible");
}

function consoleHide(){
    consoleVisible = false;
    debugConsole.classList.remove("visible");
}

function consoleToggle(){
    if(consoleVisible) consoleHide();
    else consoleShow();
}

function consoleLine(){
    var parts = [];
    var i;
    var v;
    var line;

    for(i = 0; i < arguments.length; i++){
        v = arguments[i];
        if(typeof v === "object"){
            try{
                parts.push(JSON.stringify(v));
            }
            catch(e){
                parts.push(String(v));
            }
        }
        else{
            parts.push(String(v));
        }
    }

    line = parts.join(" ");
    console.log(line);

    if(debugConsole){
        debugConsole.textContent += line + "\n";
        debugConsole.scrollTop = debugConsole.scrollHeight;
    }
}

function resizeCanvas(){
    var canvas = document.getElementById("canvas");
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth;
    var h = window.innerHeight;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    canvas.width = Math.max(1, Math.round(w * dpr));
    canvas.height = Math.max(1, Math.round(h * dpr));

    consoleLine("resize", w, h, "dpr", dpr, "canvas", canvas.width, canvas.height);
}

updateVersionLabels();

var title = document.getElementById("gameTitle");
var canvas = document.getElementById("canvas");

title.addEventListener("pointerdown", function(e){
    e.preventDefault();
    e.stopPropagation();

    if (window.spinviewDeactivateKeyboard) {
        window.spinviewDeactivateKeyboard();
    }

    if (document.activeElement === canvas) {
        canvas.blur();
    }

    consoleToggle();
});

document.addEventListener("pointerdown", function(e){
    if(!consoleVisible) return;
    if(debugConsole.contains(e.target)) return;
    if(e.target === title) return;
    consoleHide();
});

window.addEventListener("load", function(){
    resizeCanvas();
});

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", function(){
    setTimeout(resizeCanvas, 50);
    setTimeout(resizeCanvas, 250);
});

if(window.visualViewport){
    window.visualViewport.addEventListener("resize", resizeCanvas);
}

window.onerror = function(message, source, lineno, colno, error){
    consoleLine("[onerror]", message, source, lineno, colno, error ? error.stack || error : "");
};

var Module = {
    canvas: canvas,

    locateFile: function(path){
        var version = getCurrentVersion();
        var sep = path.indexOf("?") >= 0 ? "&" : "?";
        return path + sep + "_v=" + encodeURIComponent(version);
    },

    print: function(){
        consoleLine("[stdout]", Array.prototype.slice.call(arguments).join(" "));
    },

    printErr: function(){
        consoleLine("[stderr]", Array.prototype.slice.call(arguments).join(" "));
    },

    onRuntimeInitialized: function(){
        resizeCanvas();
        consoleLine("runtime ready");

        if (window.spinviewActivateKeyboard) {
            window.spinviewActivateKeyboard();
        }

        var loader = document.getElementById("loader");
        if(loader){
            loader.style.display = "none";
        }
    }
};
</script>

<script>
(function(){
    var version = getCurrentVersion();
    var s = document.createElement("script");
    s.async = true;
    s.src = "App.js?_v=" + encodeURIComponent(version);
    document.body.appendChild(s);
})();
</script>

</body>
</html>
