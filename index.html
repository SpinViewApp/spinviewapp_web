<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            position: fixed;
            inset: 0;
        }

        canvas#canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .game-title {
            pointer-events: none;
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-family: "Arial Black", Gadget, sans-serif;
            font-size: 30px;
            z-index: 1;
        }

        .game-menu-item {
            pointer-events: auto;
            font-size: 18px;
            padding-left: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .game-menu-link {
            color: white;
            text-decoration: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid white;
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading engine...</div>
    </div>

    <div id="gameTitle" class="game-title"></div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        const APP_VERSION = "6";

        function updateTitle() {
            const title = document.getElementById("gameTitle");
            if (title) {
                title.textContent = "Spinview v" + APP_VERSION;
            }
        }

        function resizeCanvasToNative() {
            const canvas = document.getElementById("canvas");
            if (!canvas) return;

            const dpr = window.devicePixelRatio || 1;
            const cssW = canvas.clientWidth;
            const cssH = canvas.clientHeight;

            const realW = Math.max(1, Math.round(cssW * dpr));
            const realH = Math.max(1, Math.round(cssH * dpr));

            if (canvas.width !== realW || canvas.height !== realH) {
                canvas.width = realW;
                canvas.height = realH;

                console.log("canvas resize", {
                    cssW: cssW,
                    cssH: cssH,
                    dpr: dpr,
                    realW: realW,
                    realH: realH
                });
            }
        }

        let resizeScheduled = false;
        let stableFramesLeft = 0;
        let lastClientW = -1;
        let lastClientH = -1;

        function runResizePass() {
            resizeScheduled = false;

            const canvas = document.getElementById("canvas");
            if (!canvas) return;

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            resizeCanvasToNative();

            if (w !== lastClientW || h !== lastClientH) {
                lastClientW = w;
                lastClientH = h;
                stableFramesLeft = 3;
            } else if (stableFramesLeft > 0) {
                stableFramesLeft--;
            }

            if (stableFramesLeft > 0) {
                requestAnimationFrame(runResizePass);
            }
        }

        function scheduleResize() {
            if (resizeScheduled) return;
            resizeScheduled = true;
            requestAnimationFrame(runResizePass);
        }

        updateTitle();

        var Module = {
            canvas: (function () {
                return document.getElementById("canvas");
            })(),
            preRun: [],
            locateFile: function(path) {
                return path + "?v=" + APP_VERSION;
            },
            print: function() {
                console.log("[stdout]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            printErr: function() {
                console.log("[stderr]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            onRuntimeInitialized: function() {
                scheduleResize();

                const loader = document.getElementById("loader");
                if (loader) {
                    loader.classList.add("hidden");
                    loader.addEventListener("transitionend", function onEnd() {
                        loader.removeEventListener("transitionend", onEnd);
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    });
                }
            }
        };

        window.addEventListener("load", function() {
            updateTitle();
            scheduleResize();
        });

        window.addEventListener("resize", function() {
            scheduleResize();
        });

        window.addEventListener("orientationchange", function() {
            scheduleResize();
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", function() {
                scheduleResize();
            });
        }

        window.onerror = function(message, source, lineno, colno, error) {
            console.log("[onerror]:", message, source, lineno, colno, error);
        };

        (function() {
            const s = document.createElement("script");
            s.async = true;
            s.src = "App.js?v=" + APP_VERSION;
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
