<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
            zoom: 1.0 !important;
            transform: scale(1) !important;
        }

        canvas#canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .game-title {
            pointer-events: none;
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-family: "Arial Black", Gadget, sans-serif;
            font-size: 30px;
            z-index: 1;
        }

        .game-menu-item {
            pointer-events: auto;
            font-size: 18px;
            padding-left: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .game-menu-link {
            color: white;
            text-decoration: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid white;
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading engine...</div>
    </div>

    <!-- Le titre affiche maintenant la version dynamiquement -->
    <div class="game-title" id="gameTitle">Spinview</div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        // ────────────────────────────────────────────────
        // Version unique → change-la ICI seulement !
        const APP_VERSION = "3";
        // ────────────────────────────────────────────────

        // Mise à jour du titre affiché avec la version
        document.getElementById("gameTitle").textContent = `Spinview v${APP_VERSION}`;

        var Module = {
            canvas: (() => document.getElementById('canvas'))(),
            preRun: [],
            locateFile: (path) => `${path}?v=${APP_VERSION}`,
            print: (...args) => console.log('[stdout]: ' + args.join(' ')),
            printErr: (...args) => console.log('[stderr]: ' + args.join(' ')),
            onRuntimeInitialized: function(){
                const loader = document.getElementById("loader");
                loader.classList.add("hidden");
                setTimeout(()=>loader.remove(),500);
            }
        };

        window.onerror = (event) =>
            console.log('[onerror]: ' + event.message);
    </script>

    <script async src=`App.js?v=${APP_VERSION}`></script>
</body>
</html>
