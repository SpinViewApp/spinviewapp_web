<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

    <script defer src="version.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            position: fixed;
            inset: 0;
        }

        #app-root {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: black;
        }

        canvas#canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            background: black;
        }

        .game-title {
            pointer-events: none;
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-family: "Arial Black", Gadget, sans-serif;
            font-size: 30px;
            z-index: 2;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid white;
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <div id="loader">
            <div class="spinner"></div>
            <div class="loader-text" id="loaderText">Loading engine...</div>
        </div>

        <div id="gameTitle" class="game-title">Spinview</div>

        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <script>
        function getCurrentVersionFromUrl() {
            try {
                const url = new URL(window.location.href);
                return url.searchParams.get("_v") || "dev";
            } catch (_) {
                return "dev";
            }
        }

        function updateVersionLabels() {
            const version = getCurrentVersionFromUrl();
            const title = document.getElementById("gameTitle");
            const loaderText = document.getElementById("loaderText");

            if (title) {
                title.textContent = "Spinview " + version;
            }

            if (loaderText) {
                loaderText.textContent = "Loading engine... " + version;
            }

            document.title = "Spinview " + version;
        }

        updateVersionLabels();

        var Module = {
            canvas: (function () {
                return document.getElementById("canvas");
            })(),
            preRun: [],
            locateFile: function(path) {
                const version = getCurrentVersionFromUrl();
                const sep = path.indexOf("?") >= 0 ? "&" : "?";
                return path + sep + "_v=" + encodeURIComponent(version);
            },
            print: function() {
                console.log("[stdout]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            printErr: function() {
                console.log("[stderr]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            onRuntimeInitialized: function() {
                const loader = document.getElementById("loader");
                if (loader) {
                    loader.classList.add("hidden");
                    loader.addEventListener("transitionend", function onEnd() {
                        loader.removeEventListener("transitionend", onEnd);
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    });
                }
            }
        };

        window.addEventListener("load", function() {
            updateVersionLabels();
        });

        window.onerror = function(message, source, lineno, colno, error) {
            console.log("[onerror]:", message, source, lineno, colno, error);
        };

        (function() {
            const version = getCurrentVersionFromUrl();
            const s = document.createElement("script");
            s.async = true;
            s.src = "App.js?_v=" + encodeURIComponent(version);
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
