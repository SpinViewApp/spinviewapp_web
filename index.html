<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            position: fixed;
            inset: 0;
        }

        canvas#canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .game-title {
            pointer-events: none;
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-family: "Arial Black", Gadget, sans-serif;
            font-size: 30px;
            z-index: 1;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid white;
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading engine...</div>
    </div>

    <div id="gameTitle" class="game-title"></div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        const APP_VERSION = "8";

        function updateTitle() {
            const title = document.getElementById("gameTitle");
            if (title) {
                title.textContent = "Spinview v" + APP_VERSION;
            }
        }

        let resizeScheduled = false;
        let lastCssW = -1;
        let lastCssH = -1;
        let settleFrames = 0;

        function applyCanvasSize() {
            const canvas = document.getElementById("canvas");
            if (!canvas) return;

            const dpr = window.devicePixelRatio || 1;
            const cssW = Math.max(1, Math.round(window.innerWidth));
            const cssH = Math.max(1, Math.round(window.innerHeight));
            const fbW = Math.max(1, Math.round(cssW * dpr));
            const fbH = Math.max(1, Math.round(cssH * dpr));

            canvas.style.width = cssW + "px";
            canvas.style.height = cssH + "px";

            if (typeof Module !== "undefined" && typeof Module.setCanvasSize === "function") {
                Module.setCanvasSize(fbW, fbH, false);
            } else {
                canvas.width = fbW;
                canvas.height = fbH;
            }

            console.log("resize", {
                cssW: cssW,
                cssH: cssH,
                dpr: dpr,
                fbW: fbW,
                fbH: fbH
            });
        }

        function resizePass() {
            resizeScheduled = false;

            const cssW = Math.max(1, Math.round(window.innerWidth));
            const cssH = Math.max(1, Math.round(window.innerHeight));

            applyCanvasSize();

            if (cssW !== lastCssW || cssH !== lastCssH) {
                lastCssW = cssW;
                lastCssH = cssH;
                settleFrames = 2;
            } else if (settleFrames > 0) {
                settleFrames--;
            }

            if (settleFrames > 0) {
                requestAnimationFrame(resizePass);
            }
        }

        function scheduleResize() {
            if (resizeScheduled) return;
            resizeScheduled = true;
            requestAnimationFrame(resizePass);
        }

        updateTitle();

        var Module = {
            canvas: (function () {
                return document.getElementById("canvas");
            })(),
            preRun: [],
            locateFile: function(path) {
                return path + "?v=" + APP_VERSION;
            },
            print: function() {
                console.log("[stdout]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            printErr: function() {
                console.log("[stderr]: " + Array.prototype.slice.call(arguments).join(" "));
            },
            onRuntimeInitialized: function() {
                scheduleResize();

                const loader = document.getElementById("loader");
                if (loader) {
                    loader.classList.add("hidden");
                    loader.addEventListener("transitionend", function onEnd() {
                        loader.removeEventListener("transitionend", onEnd);
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    });
                }
            }
        };

        window.addEventListener("load", function() {
            updateTitle();
            scheduleResize();
        });

        window.addEventListener("resize", scheduleResize);
        window.addEventListener("orientationchange", scheduleResize);

        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", scheduleResize);
        }

        window.onerror = function(message, source, lineno, colno, error) {
            console.log("[onerror]:", message, source, lineno, colno, error);
        };

        (function() {
            const s = document.createElement("script");
            s.async = true;
            s.src = "App.js?v=" + APP_VERSION;
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
