<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Spinview</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

    <script defer src="version.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            position: fixed;
            inset: 0;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }

        #canvas {
            position: fixed;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            background: #000;
            touch-action: none;
            z-index: 0;
        }

        .game-title {
            position: fixed;
            left: 10px;
            bottom: 10px;
            z-index: 20;
            color: #fff;
            font-size: 24px;
            line-height: 1;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            cursor: pointer;
            padding: 8px 10px;
            background: rgba(0,0,0,0.18);
            border-radius: 8px;
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #0a0a0a;
            color: #fff;
            transition: opacity 0.35s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .loader-text {
            font-size: 15px;
            opacity: 0.85;
        }

        #debugConsole {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 60px;
            max-height: 45vh;
            overflow: auto;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            color: #9fef9f;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px;
            font: 12px/1.4 monospace;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
            pointer-events: auto;
        }

        #debugConsole.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="loaderText" class="loader-text">Loading engine...</div>
    </div>

    <div id="gameTitle" class="game-title">Spinview</div>
    <div id="debugConsole"></div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        function getCurrentVersion() {
            try {
                var url = new URL(window.location.href);
                var v = url.searchParams.get("_v");
                if (v) return v;

                v = localStorage.getItem("siteVersion");
                if (v) return v;
            } catch (_) {
            }
            return "dev";
        }

        function updateVersionLabels() {
            var version = getCurrentVersion();
            var title = document.getElementById("gameTitle");
            var loaderText = document.getElementById("loaderText");

            if (title) {
                title.textContent = "Spinview " + version;
            }

            if (loaderText) {
                loaderText.textContent = "Loading engine... " + version;
            }

            document.title = "Spinview " + version;
        }

        var debugConsole = document.getElementById("debugConsole");
        var debugConsoleVisible = false;

        function appendDebugLine() {
            var parts = [];
            for (var i = 0; i < arguments.length; i++) {
                var v = arguments[i];
                if (typeof v === "object") {
                    try {
                        parts.push(JSON.stringify(v));
                    } catch (_) {
                        parts.push(String(v));
                    }
                } else {
                    parts.push(String(v));
                }
            }

            var line = parts.join(" ");
            console.log(line);

            if (debugConsole) {
                debugConsole.textContent += line + "\n";
                debugConsole.scrollTop = debugConsole.scrollHeight;
            }
        }

        function toggleDebugConsole() {
            debugConsoleVisible = !debugConsoleVisible;
            if (debugConsole) {
                debugConsole.classList.toggle("visible", debugConsoleVisible);
            }
        }

        function getViewportSize() {
            var w = window.innerWidth;
            var h = window.innerHeight;

            if (window.visualViewport) {
                w = Math.round(window.visualViewport.width);
                h = Math.round(window.visualViewport.height);
            }

            return { width: w, height: h };
        }

        function resizeCanvasToNativePixels() {
            var canvas = document.getElementById("canvas");
            if (!canvas) return;

            var vp = getViewportSize();
            var dpr = window.devicePixelRatio || 1;

            var cssW = vp.width;
            var cssH = vp.height;

            var realW = Math.max(1, Math.round(cssW * dpr));
            var realH = Math.max(1, Math.round(cssH * dpr));

            canvas.style.width = cssW + "px";
            canvas.style.height = cssH + "px";

            if (canvas.width !== realW) {
                canvas.width = realW;
            }
            if (canvas.height !== realH) {
                canvas.height = realH;
            }

            appendDebugLine(
                "[resizeCanvas]",
                "css=", cssW + "x" + cssH,
                "dpr=", dpr,
                "real=", realW + "x" + realH
            );
        }

        function debugCanvasSizes() {
            var canvas = document.getElementById("canvas");
            if (!canvas) return;

            appendDebugLine("----- SIZE DEBUG -----");
            appendDebugLine("window.innerWidth/innerHeight =", window.innerWidth, window.innerHeight);
            appendDebugLine("documentElement.clientWidth/clientHeight =", document.documentElement.clientWidth, document.documentElement.clientHeight);
            appendDebugLine("body.clientWidth/clientHeight =", document.body.clientWidth, document.body.clientHeight);
            appendDebugLine("canvas.clientWidth/clientHeight =", canvas.clientWidth, canvas.clientHeight);
            appendDebugLine("canvas.width/height =", canvas.width, canvas.height);

            if (window.visualViewport) {
                appendDebugLine("visualViewport.width/height/scale =",
                    window.visualViewport.width,
                    window.visualViewport.height,
                    window.visualViewport.scale
                );
            } else {
                appendDebugLine("visualViewport = none");
            }

            appendDebugLine("devicePixelRatio =", window.devicePixelRatio);
        }

        updateVersionLabels();

        var Module = {
            canvas: document.getElementById("canvas"),
            preRun: [],
            postRun: [],
            locateFile: function(path) {
                var version = getCurrentVersion();
                var sep = path.indexOf("?") >= 0 ? "&" : "?";
                return path + sep + "_v=" + encodeURIComponent(version);
            },
            print: function() {
                appendDebugLine("[stdout]:", Array.prototype.slice.call(arguments).join(" "));
            },
            printErr: function() {
                appendDebugLine("[stderr]:", Array.prototype.slice.call(arguments).join(" "));
            },
            setStatus: function(text) {
                if (text) {
                    appendDebugLine("[status]:", text);
                }
            },
            onRuntimeInitialized: function() {
                resizeCanvasToNativePixels();
                debugCanvasSizes();

                var loader = document.getElementById("loader");
                if (loader) {
                    loader.classList.add("hidden");
                    loader.addEventListener("transitionend", function onEnd() {
                        loader.removeEventListener("transitionend", onEnd);
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    });
                }
            }
        };

        function afterViewportChange() {
            resizeCanvasToNativePixels();
            debugCanvasSizes();
        }

        window.addEventListener("load", function() {
            resizeCanvasToNativePixels();
            updateVersionLabels();
            debugCanvasSizes();
        });

        window.addEventListener("resize", afterViewportChange);
        window.addEventListener("orientationchange", function() {
            setTimeout(afterViewportChange, 50);
            setTimeout(afterViewportChange, 250);
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", afterViewportChange);
        }

        window.onerror = function(message, source, lineno, colno, error) {
            appendDebugLine("[onerror]:", message, source, lineno, colno, error ? (error.stack || error) : "");
        };

        (function setupTitleToggle() {
            var title = document.getElementById("gameTitle");
            if (!title) return;

            function onToggle(ev) {
                ev.preventDefault();
                ev.stopPropagation();
                toggleDebugConsole();
                appendDebugLine("[ui]: title toggled console");
            }

            title.addEventListener("pointerdown", onToggle, { passive: false });
            title.addEventListener("click", onToggle, false);
            title.addEventListener("touchstart", onToggle, { passive: false });
        })();
    </script>

    <script>
        (function() {
            var version = getCurrentVersion();
            var s = document.createElement("script");
            s.async = true;
            s.src = "App.js?_v=" + encodeURIComponent(version);
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
